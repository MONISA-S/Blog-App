<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="left"></div>
    <div class="center">
      <h1>MY BLOG APPLICATION</h1>
      <button id="darkModeToggle">🌙 Dark Mode</button>
    </div>
    <div class="right">
      <button id="adminLogin" onclick="adminLogin()">Admin Login</button>
    </div>
  </header>

  <section id="filterSection">
    <label>Filter by Category:</label>
    <select id="categoryFilter">
      <option value="All">All</option>
    </select>
  </section>

  <section id="home">
    <input type="text" id="searchInput" placeholder="Search posts by title...">
    <div id="postList"></div>
  </section>

  <section id="fullPost" class="hidden">
    <button id="backBtn">⬅ Back</button>
    <h2 id="fullTitle"></h2>
    <img id="fullImage" src="" alt="" width="100%">
    <p id="fullContent"></p>
    <p id="postDate"></p>
    <button id="likeBtn">👍 Like (<span id="likeCount">0</span>)</button>

    <div id="commentsSection">
      <h3>Comments</h3>
      <input type="text" id="commentInput" placeholder="Write a comment...">
      <button id="addCommentBtn">Add Comment</button>
      <ul id="commentList"></ul>
    </div>
  </section>
  <div id="adminSection" class="hidden">
    <h3>Add New Post</h3>
    <input type="text" id="postTitle" placeholder="Title">
    <textarea id="postContent" placeholder="Content"></textarea>
    <input type="text" id="postCategory" placeholder="Category">
    <input type="text" id="postImage" placeholder="Image URL">

    <div class="saveBox">
      <button id="savePost" onclick="savePost()">Save Post</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
